<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Celestial Tarot</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
</head>
<body class="auth-bg">

    <div class="container d-flex align-items-center justify-content-center py-5">
        <div class="auth-card">
            <div class="theme-toggle" id="theme-toggle" title="Toggle Theme">
                <i class="bi bi-moon-stars-fill"></i>
            </div>
            <div class="text-center mb-5">
                <a href="index.html" class="navbar-brand d-flex align-items-center justify-content-center gap-2 mb-4">
                    <img src="assets/img/favicon.svg" alt="Celestial Tarot" width="45" height="45" style="border-radius:50%;">
                    <h2 class="fw-bold mb-0">Celestial Tarot</h2>
                </a>
                <h4 class="fw-bold mt-2">Welcome Back</h4>
                <p class="text-muted small">Realign with your celestial path.</p>
            </div>

            <form action="dashboard.html">
                <div class="mb-4">
                    <label class="form-label fw-bold">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                        <i class="bi bi-eye password-toggle" onclick="const p = document.getElementById('password'); p.type = p.type === 'password' ? 'text' : 'password'"></i>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label small opacity-75" for="remember">Remember Me</label>
                    </div>
                    <a href="#" class="small text-decoration-none fw-bold text-secondary">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 mb-4 shadow">Login</button>
            </form>

            <div class="auth-divider">
                <span>Or login with</span>
            </div>

            <div class="row g-3">
                <div class="col-6">
                    <button class="btn btn-outline-primary bg-white w-100"><i class="bi bi-google me-2"></i>Google</button>
                </div>
                <div class="col-6">
                    <button class="btn btn-outline-primary bg-white w-100"><i class="bi bi-apple me-2"></i>Apple</button>
                </div>
            </div>

            <p class="text-center mt-5 mb-0 opacity-75">
                New seeker? <a href="signup.html" class="fw-bold text-decoration-none text-secondary">Explore Options</a>
            </p>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
