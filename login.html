<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Celestial Tarot</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a0633 0%, #2d0b5a 50%, #1a0633 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(224, 192, 151, 0.05) 0%, transparent 70%);
            top: -50%;
            left: -50%;
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.2);
        }
        [data-theme="dark"] .auth-card {
            background: rgba(45, 11, 90, 0.8);
            color: #FFFFFF;
        }
        .social-login .btn {
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 15px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            background: #fff;
        }
        .social-login .btn:hover {
            background-color: var(--tertiary-color);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .form-control-lg {
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 1rem;
            border: 2px solid #f1f1f1;
        }
        .form-control-lg:focus {
            border-color: var(--secondary-color);
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-5">
                <a href="index.html" class="d-inline-flex align-items-center text-decoration-none mb-3">
                    <i class="bi bi-stars fs-1 text-secondary me-2"></i>
                    <h2 class="fw-bold text-primary mb-0">Celestial Tarot</h2>
                </a>
                <h4 class="fw-bold text-primary">Welcome back, Seeker</h4>
                <p class="text-muted">Enter your details to continue your journey</p>
            </div>

            <form action="dashboard.html">
                <div class="mb-4">
                    <label class="form-label fw-bold text-primary">Email Address</label>
                    <input type="email" class="form-control form-control-lg" placeholder="name@example.com" required>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label fw-bold text-primary">Password</label>
                        <a href="#" class="text-secondary small text-decoration-none fw-bold">Forgot password?</a>
                    </div>
                    <input type="password" class="form-control form-control-lg" placeholder="••••••••" required>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label small text-muted" for="remember">Keep me signed in for 30 days</label>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-4 shadow-sm fw-bold py-3">Login to Sanctuary</button>
            </form>

            <div class="text-center mb-4 position-relative">
                <hr class="text-muted opacity-25">
                <span class="position-absolute top-50 start-50 translate-middle px-3 bg-white text-muted small" id="or-label">Or continue with</span>
            </div>

            <div class="row g-3 social-login">
                <div class="col-6">
                    <a href="#" class="btn btn-light w-100"><i class="bi bi-google text-danger"></i></a>
                </div>
                <div class="col-6">
                    <a href="#" class="btn btn-light w-100"><i class="bi bi-apple text-dark"></i></a>
                </div>
            </div>

            <p class="text-center mt-5 mb-0 text-muted">
                New to the path? <a href="signup.html" class="text-secondary fw-bold text-decoration-none">Create an Account</a>
            </p>
        </div>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle position-fixed top-0 end-0 m-4" id="theme-toggle" style="cursor: pointer; z-index: 100;">
        <i class="bi bi-moon-stars-fill text-white fs-4"></i>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // Adjust labels based on theme
        const observer = new MutationObserver(() => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const label = document.getElementById('or-label');
            if (label) {
                label.style.backgroundColor = isDark ? '#2D0B5A' : '#ffffff';
            }
        });
        observer.observe(document.documentElement, { attributes: true });
    </script>
</body>
</html>
