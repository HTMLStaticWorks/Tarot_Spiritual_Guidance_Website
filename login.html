<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Celestial Tarot</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
<body class="bg-dark">

    <div class="theme-rtl-controls position-fixed top-0 end-0 m-4 d-flex gap-3" style="z-index: 1000;">
        <div class="theme-toggle" id="theme-toggle">
            <i class="bi bi-moon-stars-fill text-white"></i>
        </div>
        <div class="rtl-toggle" id="rtl-toggle" onclick="document.documentElement.dir = document.documentElement.dir === 'rtl' ? 'ltr' : 'rtl'">
            <i class="bi bi-translate text-white"></i>
        </div>
    </div>

    <div class="auth-container d-flex align-items-center justify-content-center py-5" style="min-height: 100vh;">
        <div class="auth-card card p-4 p-md-5 border-0 shadow-lg" style="max-width: 500px; width: 100%;">
            <div class="text-center mb-4">
                <i class="bi bi-stars fs-1 text-primary"></i>
                <h2 class="fw-bold text-primary mt-2">Celestial Guidance</h2>
                <h4 class="fw-bold mt-4">Welcome Back</h4>
            </div>

            <form action="dashboard.html">
                <div class="mb-3">
                    <label class="form-label fw-bold">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                        <i class="bi bi-eye password-toggle" onclick="const p = document.getElementById('password'); p.type = p.type === 'password' ? 'text' : 'password'"></i>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label small" for="remember">Remember Me</label>
                    </div>
                    <a href="#" class="small text-decoration-none fw-bold text-primary">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 mb-4">Login</button>
            </form>

            <div class="text-center mb-4 position-relative">
                <hr>
                <span class="position-absolute top-50 start-50 translate-middle px-3 bg-white text-muted small">Or login with</span>
            </div>

            <div class="row g-3">
                <div class="col-6">
                    <button class="btn btn-secondary w-100"><i class="bi bi-google me-2"></i>Google</button>
                </div>
                <div class="col-6">
                    <button class="btn btn-secondary w-100"><i class="bi bi-apple me-2"></i>Apple</button>
                </div>
            </div>

            <p class="text-center mt-4 mb-0">
                New seeker? <a href="signup.html" class="fw-bold text-decoration-none text-primary">Explore Options</a>
            </p>
        </div>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle position-fixed top-0 end-0 m-4" id="theme-toggle" style="cursor: pointer; z-index: 100;">
        <i class="bi bi-moon-stars-fill text-white fs-4"></i>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // Adjust labels based on theme
        const observer = new MutationObserver(() => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const label = document.getElementById('or-label');
            if (label) {
                label.style.backgroundColor = isDark ? '#2D0B5A' : '#ffffff';
            }
        });
        observer.observe(document.documentElement, { attributes: true });
    </script>
</body>
</html>
