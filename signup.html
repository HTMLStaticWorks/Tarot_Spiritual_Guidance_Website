<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | Celestial Tarot & Spiritual Guidance</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-color) 0%, #4B0082 100%);
            padding: 20px;
        }
        .auth-card {
            background: var(--bg-color);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .social-login .btn {
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 10px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: var(--transition);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-4">
                <a href="index.html" class="d-flex align-items-center justify-content-center text-decoration-none">
                    <i class="bi bi-stars fs-2 text-secondary me-2"></i>
                    <h3 class="fw-bold text-primary mb-0">Celestial Tarot</h3>
                </a>
                <p class="text-muted mt-2">Begin your journey of spiritual enlightenment</p>
            </div>

            <form action="dashboard.html">
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">First Name</label>
                        <input type="text" class="form-control form-control-lg rounded-3" placeholder="Jane" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Last Name</label>
                        <input type="text" class="form-control form-control-lg rounded-3" placeholder="Doe" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Email Address</label>
                    <input type="email" class="form-control form-control-lg rounded-3" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" class="form-control form-control-lg rounded-3" placeholder="••••••••" required>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label small" for="terms">I agree to the <a href="#" class="text-secondary">Terms & Conditions</a></label>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 mb-4">Create Your Account</button>
            </form>

            <div class="text-center mb-4">
                <span class="text-muted small px-2 bg-white position-relative" style="z-index: 1;">Or signup with</span>
                <hr class="mt-n2" style="margin-top: -10px;">
            </div>

            <div class="row g-2 social-login">
                <div class="col-6">
                    <a href="#" class="btn btn-light w-100 text-primary"><i class="bi bi-google"></i></a>
                </div>
                <div class="col-6">
                    <a href="#" class="btn btn-light w-100 text-primary"><i class="bi bi-facebook"></i></a>
                </div>
            </div>

            <p class="text-center mt-4 mb-0 small text-muted">
                Already have an account? <a href="login.html" class="text-secondary fw-bold text-decoration-none">Login Here</a>
            </p>
        </div>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle position-fixed top-0 end-0 m-4" id="theme-toggle">
        <i class="bi bi-moon-stars-fill text-white"></i>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
